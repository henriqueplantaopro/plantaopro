<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantãoPro — Relatórios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1a5fad;--blue-dark:#0f3d7a;--blue-light:#e8f0fb;--green:#2d7a3a;
  --border:#e0dbd2;--bg:#f8f7f4;--text:#1a1a1a;--text2:#555;--text3:#999;--radius:12px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:24px;}
.wrap{max-width:1000px;margin:0 auto;}
h1{font-size:22px;font-weight:800;margin-bottom:4px;}
.sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.barra{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:20px;}
.campo{display:flex;flex-direction:column;gap:4px;}
.campo label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);}
.campo input,.campo select{padding:9px 12px;font-size:14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;outline:none;}
.campo input:focus,.campo select:focus{border-color:var(--blue);}
.btn{padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn:hover{background:var(--blue-dark);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.btn-excel{background:var(--green);}
.btn-excel:hover{background:#236030;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.card .rotulo{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);margin-bottom:6px;}
.card .valor{font-size:22px;font-weight:800;color:var(--blue);}
.painel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--border);}
th:first-child,td:first-child{text-align:left;}
thead th{font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);background:#fafafa;}
tbody tr:hover{background:var(--blue-light);}
tfoot td{font-weight:800;border-top:2px solid var(--blue);color:var(--blue-dark);}
.num{font-variant-numeric:tabular-nums;}
#msg{font-size:13px;color:var(--text2);padding:12px 0;}
.erro{color:#b03030;}
canvas{max-height:320px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Relatórios</h1>
  <div class="sub">Os dados do período são buscados uma vez; trocar o agrupamento recalcula na hora, sem nova consulta.</div>

  <div class="barra">
    <div class="campo">
      <label>Mês</label>
      <input type="month" id="mes" value="2026-04">
    </div>
    <div class="campo">
      <label>Agrupar por</label>
      <select id="agrupar" onchange="recalcular()">
        <option value="unidade">Unidade</option>
        <option value="setor">Setor</option>
        <option value="tipo">Tipo de plantão</option>
        <option value="medico">Médico (pagamento)</option>
      </select>
    </div>
    <div class="campo">
      <label>Modo</label>
      <select id="modo" onchange="recalcular()">
        <option value="previsto">Previsto (todos)</option>
        <option value="realizado">Realizado (com médico)</option>
      </select>
    </div>
    <div class="campo">
      <label>&nbsp;</label>
      <button class="btn" id="btn-gerar" onclick="carregar()">Gerar</button>
    </div>
    <div class="campo">
      <label>&nbsp;</label>
      <button class="btn btn-excel" id="btn-excel" onclick="exportarXlsx()" style="display:none;">Exportar Excel</button>
    </div>
  </div>

  <div id="msg">Escolha o mês e clique em "Gerar".</div>

  <div class="cards" id="cards" style="display:none;">
    <div class="card"><div class="rotulo">Plantões</div><div class="valor num" id="c-plantoes">—</div></div>
    <div class="card"><div class="rotulo">Horas</div><div class="valor num" id="c-horas">—</div></div>
    <div class="card"><div class="rotulo">Custo total</div><div class="valor num" id="c-custo">—</div></div>
    <div class="card"><div class="rotulo">Custo médio/plantão</div><div class="valor num" id="c-medio">—</div></div>
  </div>

  <div class="painel" id="painel-tabela" style="display:none;">
    <table>
      <thead>
        <tr>
          <th id="th-grupo">Unidade</th>
          <th>Plantões</th>
          <th>Com custo</th>
          <th>Horas</th>
          <th>Custo total</th>
          <th>Custo médio</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>

  <div class="painel" id="painel-grafico" style="display:none;">
    <canvas id="grafico"></canvas>
  </div>
</div>

<script>
const BRL = (v) => (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const NUM = (v) => (v || 0).toLocaleString('pt-BR');
let chart = null;
let feed = null;            // dados crus do período (buscados 1x)
let relatorioAtual = null;  // resultado agregado atual (pra exportar)

const ROTULO_GRUPO = { unidade: 'Unidade', setor: 'Setor', tipo: 'Tipo de plantão', medico: 'Médico' };

function periodoDoMes(mes) {
  const [ano, m] = mes.split('-').map(Number);
  const ultimo = new Date(ano, m, 0).getDate();
  return { inicio: `${mes}-01`, fim: `${mes}-${String(ultimo).padStart(2, '0')}` };
}

// Busca os dados do período UMA vez.
async function carregar() {
  const mes = document.getElementById('mes').value;
  if (!mes) { setMsg('Escolha um mês.', true); return; }
  const { inicio, fim } = periodoDoMes(mes);

  const btn = document.getElementById('btn-gerar');
  btn.disabled = true; btn.textContent = 'Buscando...';
  document.getElementById('btn-excel').style.display = 'none';
  esconder();

  try {
    const resp = await fetch(`/api/relatorios?inicio=${inicio}&fim=${fim}`);
    const data = await resp.json();
    if (!resp.ok) { setMsg(data.erro || 'Erro ao buscar dados.', true); feed = null; return; }
    feed = data;
    recalcular();
  } catch (e) {
    setMsg('Erro de conexão. Você está logado no painel?', true); feed = null;
  } finally {
    btn.disabled = false; btn.textContent = 'Gerar';
  }
}

// Recalcula o relatório a partir do feed já em memória (sem nova chamada).
function recalcular() {
  if (!feed) return;
  const agrupar = document.getElementById('agrupar').value;
  const modo = document.getElementById('modo').value;

  // "Realizado" = lançamento com médico atribuído (ajuste quando definir o critério).
  let linhas = feed.lancamentos;
  if (modo === 'realizado') linhas = linhas.filter((l) => l.medico_id);

  const chave = (l) => {
    if (agrupar === 'unidade') return feed.projetos[l.projeto_id] || '(sem projeto)';
    if (agrupar === 'setor')   return l.setor || '(sem setor)';
    if (agrupar === 'tipo')    return l.tipo || '(sem tipo)';
    if (agrupar === 'medico')  return (feed.medicos[l.medico_id]?.nome) || '(sem médico)';
    return '—';
  };

  const grupos = {};
  const total = { plantoes: 0, com_custo: 0, horas: 0, custo: 0 };
  for (const l of linhas) {
    const k = chave(l);
    const honor = parseFloat(l.honorario) || 0;
    const horas = parseFloat(l.horas) || 0;
    if (!grupos[k]) grupos[k] = { grupo: k, plantoes: 0, com_custo: 0, horas: 0, custo: 0 };
    const g = grupos[k];
    g.plantoes += 1; total.plantoes += 1;
    if (honor > 0) { g.com_custo += 1; total.com_custo += 1; }
    g.horas += horas; total.horas += horas;
    g.custo += honor; total.custo += honor;
  }

  const itens = Object.values(grupos)
    .map((g) => ({
      grupo: g.grupo, plantoes: g.plantoes, com_custo: g.com_custo,
      horas: +g.horas.toFixed(1), custo: +g.custo.toFixed(2),
      medio: g.com_custo ? +(g.custo / g.com_custo).toFixed(2) : 0,
    }))
    .sort((a, b) => b.custo - a.custo);

  relatorioAtual = {
    rotulo: ROTULO_GRUPO[agrupar], itens,
    total: {
      plantoes: total.plantoes, com_custo: total.com_custo,
      horas: +total.horas.toFixed(1), custo: +total.custo.toFixed(2),
      medio: total.com_custo ? +(total.custo / total.com_custo).toFixed(2) : 0,
    },
  };

  if (!itens.length) { setMsg('Nenhum lançamento nesse período/critério.'); return; }
  setMsg('');
  render(relatorioAtual);
  document.getElementById('btn-excel').style.display = 'inline-block';
}

function render(r) {
  document.getElementById('c-plantoes').textContent = NUM(r.total.plantoes);
  document.getElementById('c-horas').textContent = NUM(r.total.horas) + 'h';
  document.getElementById('c-custo').textContent = BRL(r.total.custo);
  document.getElementById('c-medio').textContent = BRL(r.total.medio);
  document.getElementById('cards').style.display = 'grid';

  document.getElementById('th-grupo').textContent = r.rotulo;
  document.getElementById('tbody').innerHTML = r.itens.map((i) => `
    <tr>
      <td>${i.grupo}</td>
      <td class="num">${NUM(i.plantoes)}</td>
      <td class="num">${NUM(i.com_custo)}</td>
      <td class="num">${NUM(i.horas)}</td>
      <td class="num">${BRL(i.custo)}</td>
      <td class="num">${BRL(i.medio)}</td>
    </tr>`).join('');
  document.getElementById('tfoot').innerHTML = `
    <tr>
      <td>TOTAL GERAL</td>
      <td class="num">${NUM(r.total.plantoes)}</td>
      <td class="num">${NUM(r.total.com_custo)}</td>
      <td class="num">${NUM(r.total.horas)}</td>
      <td class="num">${BRL(r.total.custo)}</td>
      <td class="num">${BRL(r.total.medio)}</td>
    </tr>`;
  document.getElementById('painel-tabela').style.display = 'block';

  const ctx = document.getElementById('grafico');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: r.itens.map((i) => i.grupo),
      datasets: [{ label: 'Custo total (R$)', data: r.itens.map((i) => i.custo), backgroundColor: '#1a5fad', borderRadius: 4 }],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: (v) => 'R$ ' + v.toLocaleString('pt-BR') } } },
    },
  });
  document.getElementById('painel-grafico').style.display = 'block';
}

function exportarXlsx() {
  if (!relatorioAtual || !window.XLSX) return;
  const r = relatorioAtual;
  const linhas = r.itens.map((i) => ({
    [r.rotulo]: i.grupo,
    'Plantões': i.plantoes,
    'Com custo': i.com_custo,
    'Horas': i.horas,
    'Custo total (R$)': i.custo,
    'Custo médio (R$)': i.medio,
  }));
  linhas.push({
    [r.rotulo]: 'TOTAL GERAL',
    'Plantões': r.total.plantoes,
    'Com custo': r.total.com_custo,
    'Horas': r.total.horas,
    'Custo total (R$)': r.total.custo,
    'Custo médio (R$)': r.total.medio,
  });
  const ws = XLSX.utils.json_to_sheet(linhas);
  ws['!cols'] = [{ wch: 26 }, { wch: 10 }, { wch: 10 }, { wch: 8 }, { wch: 16 }, { wch: 16 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Relatorio');
  const mes = document.getElementById('mes').value;
  XLSX.writeFile(wb, `relatorio-${r.rotulo.toLowerCase()}-${mes}.xlsx`);
}

function setMsg(t, err) {
  const m = document.getElementById('msg');
  m.textContent = t; m.className = err ? 'erro' : ''; m.style.display = t ? 'block' : 'none';
}
function esconder() {
  document.getElementById('cards').style.display = 'none';
  document.getElementById('painel-tabela').style.display = 'none';
  document.getElementById('painel-grafico').style.display = 'none';
}
</script>

<script>
// ===== RELATÓRIOS — versão completa (16 tipos) =====
function gerarRelatorio(){
  const el=document.getElementById('rel-resultado');
  switch(_relTipoAtivo){
    case 'detalhado': return gerarRelDetalhado(el);
    case 'resumo': return gerarRelResumo(el);
    case 'horas': return gerarRelHoras(el);
    case 'faltas': return gerarRelFaltas(el);
    case 'atrasos': return gerarRelAtrasos(el);
    case 'checkins': return gerarRelCheckinsForaTol(el);
    case 'medicos': return gerarRelMedicos(el);
    case 'risco': return gerarRelRisco(el);
    case 'fin_analitico': return gerarRelFinAnalitico(el);
    case 'fin_consolidado': return gerarRelFinConsolidado(el);
    case 'fin_profissional': return gerarRelFinProfissional(el);
    case 'fin_banco': return gerarRelFinBanco(el);
    case 'fin_setor': return gerarRelFinSetor(el);
    case 'escala': return gerarRelEscala(el);
    case 'entrada_saida': return gerarRelEntradaSaida(el);
    case 'trocas': return gerarRelTrocas(el);
  }
}

// ---- FINANCEIRO ANALÍTICO (todos os plantões) ----
function gerarRelFinAnalitico(el){
  const dados=filtrarDadosRel();
  if(!dados.length){el.innerHTML='<div class="card"><div class="empty">Nenhum plantão no período.</div></div>';return;}
  const tot=dados.reduce((s,l)=>s+(l.honorario||0),0);
  const linhas=dados.slice().sort((a,b)=>(a.projeto||'').localeCompare(b.projeto||'','pt-BR')||a.data.localeCompare(b.data)).map(l=>`<tr><td class="mono">${fDate(l.data)}</td><td><strong>${l.medico||'—'}</strong><br><span class="mono" style="font-size:11px;color:var(--text3);">${l.crm||''}</span></td><td>${l.projeto||'—'}</td><td>${l.setor||'—'}</td><td>${l.tipo||'—'}</td><td class="mono">${l.horas}h</td><td class="mono" style="color:var(--green);font-weight:600;">${fBRL(l.honorario||0)}</td></tr>`).join('');
  el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><div class="card-title" style="margin-bottom:0;">Financeiro analítico</div><div style="font-size:12px;color:var(--text2);">${dados.length} plantão(ões) · <span style="color:var(--green);font-weight:600;">${fBRL(tot)}</span></div></div><table><thead><tr><th>Data</th><th>Médico / CRM</th><th>Hospital</th><th>Setor</th><th>Tipo</th><th>Horas</th><th>Valor</th></tr></thead><tbody>${linhas}</tbody><tfoot><tr style="border-top:1.5px solid var(--border2);"><td colspan="6" style="font-weight:600;padding:8px;">Total</td><td class="mono" style="color:var(--green);font-weight:700;">${fBRL(tot)}</td></tr></tfoot></table></div>`;
}

// ---- FINANCEIRO CONSOLIDADO (por profissional) ----
function gerarRelFinConsolidado(el){
  const dados=filtrarDadosRel();
  if(!dados.length){el.innerHTML='<div class="card"><div class="empty">Nenhum plantão no período.</div></div>';return;}
  const porMed={};
  dados.forEach(l=>{const k=l.medico_id||l.medico;if(!porMed[k])porMed[k]={nome:l.medico||'—',crm:l.crm||'',qtd:0,horas:0,total:0};porMed[k].qtd++;porMed[k].horas+=l.horas||0;porMed[k].total+=l.honorario||0;});
  const arr=Object.values(porMed).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const tot=arr.reduce((s,m)=>s+m.total,0);
  const linhas=arr.map(m=>`<tr><td><strong>${m.nome}</strong></td><td class="mono">${m.crm}</td><td style="text-align:center;">${m.qtd}</td><td class="mono">${Math.round(m.horas*10)/10}h</td><td class="mono" style="color:var(--green);font-weight:600;">${fBRL(m.total)}</td></tr>`).join('');
  el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><div class="card-title" style="margin-bottom:0;">Financeiro consolidado</div><div style="font-size:12px;color:var(--text2);">${arr.length} profissional(is) · <span style="color:var(--green);font-weight:600;">${fBRL(tot)}</span></div></div><table><thead><tr><th>Médico</th><th>CRM</th><th style="text-align:center;">Plantões</th><th>Horas</th><th>Total</th></tr></thead><tbody>${linhas}</tbody><tfoot><tr style="border-top:1.5px solid var(--border2);"><td colspan="4" style="font-weight:600;padding:8px;">Total geral</td><td class="mono" style="color:var(--green);font-weight:700;">${fBRL(tot)}</td></tr></tfoot></table></div>`;
}

// ---- FINANCEIRO POR PROFISSIONAL (agrupado, lista plantões) ----
function gerarRelFinProfissional(el){
  const dados=filtrarDadosRel();
  if(!dados.length){el.innerHTML='<div class="card"><div class="empty">Nenhum plantão no período.</div></div>';return;}
  const porMed={};
  dados.forEach(l=>{const k=l.medico_id||l.medico;if(!porMed[k])porMed[k]={nome:l.medico||'—',crm:l.crm||'',itens:[]};porMed[k].itens.push(l);});
  const meds=Object.values(porMed).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  let html='';
  meds.forEach(m=>{
    const sub=m.itens.reduce((s,l)=>s+(l.honorario||0),0);
    const subH=m.itens.reduce((s,l)=>s+(l.horas||0),0);
    const linhas=m.itens.slice().sort((a,b)=>a.data.localeCompare(b.data)).map(l=>`<tr><td class="mono">${fDate(l.data)}</td><td>${l.projeto||'—'}${l.setor?' — '+l.setor:''}</td><td>${l.tipo||'—'}</td><td class="mono">${l.horas}h</td><td class="mono" style="color:var(--green);">${fBRL(l.honorario||0)}</td></tr>`).join('');
    html+=`<div class="card" style="margin-bottom:12px;"><div style="font-size:13px;font-weight:700;margin-bottom:8px;">${m.nome} <span class="mono" style="font-size:11px;color:var(--text3);font-weight:400;">${m.crm}</span></div><table><thead><tr><th>Data</th><th>Hospital / Setor</th><th>Tipo</th><th>Duração</th><th>Valor</th></tr></thead><tbody>${linhas}</tbody><tfoot><tr style="border-top:1.5px solid var(--border2);"><td style="font-weight:600;padding:8px;">Total</td><td style="font-weight:600;">${m.itens.length} plantão(ões)</td><td></td><td class="mono" style="font-weight:600;">${Math.round(subH*10)/10}h</td><td class="mono" style="color:var(--green);font-weight:700;">${fBRL(sub)}</td></tr></tfoot></table></div>`;
  });
  el.innerHTML=html;
}

// ---- FINANCEIRO COM DADOS BANCÁRIOS ----
function gerarRelFinBanco(el){
  const dados=filtrarDadosRel();
  if(!dados.length){el.innerHTML='<div class="card"><div class="empty">Nenhum plantão no período.</div></div>';return;}
  const porMed={};
  dados.forEach(l=>{const k=l.medico_id||l.medico;if(!porMed[k])porMed[k]={id:l.medico_id,nome:l.medico||'—',crm:l.crm||'',qtd:0,total:0};porMed[k].qtd++;porMed[k].total+=l.honorario||0;});
  const arr=Object.values(porMed).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const tot=arr.reduce((s,m)=>s+m.total,0);
  const linhas=arr.map(m=>{
    const med=medicos.find(x=>x.id===m.id)||{};
    let banco='<span style="color:var(--red);">Sem dados bancários</span>';
    if(med.pix_tipo&&med.pix_chave) banco='PIX '+med.pix_tipo+': '+med.pix_chave;
    else if(med.banco) banco=med.banco+' · Ag '+(med.agencia||'—')+' · CC '+(med.conta_corrente||'—');
    return `<tr><td><strong>${m.nome}</strong></td><td class="mono">${m.crm}</td><td style="font-size:12px;">${banco}</td><td style="text-align:center;">${m.qtd}</td><td class="mono" style="color:var(--green);font-weight:600;">${fBRL(m.total)}</td></tr>`;
  }).join('');
  el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><div class="card-title" style="margin-bottom:0;">Financeiro com dados bancários</div><div style="font-size:12px;color:var(--text2);">${arr.length} profissional(is) · <span style="color:var(--green);font-weight:600;">${fBRL(tot)}</span></div></div><table><thead><tr><th>Médico</th><th>CRM</th><th>Dados bancários</th><th style="text-align:center;">Plantões</th><th>Total</th></tr></thead><tbody>${linhas}</tbody><tfoot><tr style="border-top:1.5px solid var(--border2);"><td colspan="4" style="font-weight:600;padding:8px;">Total geral</td><td class="mono" style="color:var(--green);font-weight:700;">${fBRL(tot)}</td></tr></tfoot></table></div>`;
}

// ---- FINANCEIRO POR SETOR (por hospital) ----
function gerarRelFinSetor(el){
  const dados=filtrarDadosRel();
  if(!dados.length){el.innerHTML='<div class="card"><div class="empty">Nenhum plantão no período.</div></div>';return;}
  const porProj={};
  dados.forEach(l=>{const p=l.projeto||'Sem hospital';if(!porProj[p])porProj[p]={};const s=l.setor||'(sem setor)';porProj[p][s]=(porProj[p][s]||0)+(l.honorario||0);});
  let html='';
  Object.entries(porProj).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR')).forEach(([proj,setores])=>{
    const arr=Object.entries(setores).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'));
    const totProj=arr.reduce((s,[,v])=>s+v,0);
    const linhas=arr.map(([s,v])=>`<tr><td>${s}</td><td class="mono" style="text-align:right;">${fBRL(v)}</td></tr>`).join('');
    html+=`<div class="card" style="margin-bottom:12px;"><div class="card-title">${proj}</div><table><thead><tr><th>Setor</th><th style="text-align:right;">Custo</th></tr></thead><tbody>${linhas}</tbody><tfoot><tr style="border-top:1.5px solid var(--border2);"><td style="font-weight:700;padding:8px;">Total</td><td class="mono" style="text-align:right;font-weight:700;color:var(--green);">${fBRL(totProj)}</td></tr></tfoot></table></div>`;
  });
  el.innerHTML=html;
}

// ---- ESCALA DE PLANTÕES (com furos) ----
function gerarRelEscala(el){
  const dados=filtrarDadosRel();
  if(!dados.length){el.innerHTML='<div class="card"><div class="empty">Nenhum plantão no período.</div></div>';return;}
  const porData={};
  dados.forEach(l=>{(porData[l.data]=porData[l.data]||[]).push(l);});
  let totFuros=0,html='';
  Object.keys(porData).sort().forEach(data=>{
    const lst=porData[data].slice().sort((a,b)=>(a.setor||'').localeCompare(b.setor||'','pt-BR')||(a.hora_ini||'').localeCompare(b.hora_ini||''));
    const dt=new Date(data+'T12:00:00');
    const dow=dt.toLocaleDateString('pt-BR',{weekday:'long'});
    const linhas=lst.map(l=>{
      const ehFuro=l.aberto?((l.vagas||1)-(l.vagas_preenchidas||0))>0:!l.medico_id;
      if(ehFuro) totFuros++;
      const resp=ehFuro?'<span style="color:var(--red);font-weight:600;">Sem médico escalado</span>':'<strong>'+(l.medico||'—')+'</strong>';
      return `<tr style="${ehFuro?'background:#fdf0f0;':''}"><td>${l.projeto||'—'}</td><td>${l.setor||'—'}</td><td class="mono">${(l.hora_ini||'').slice(0,5)}–${(l.hora_fim||'').slice(0,5)}</td><td>${l.tipo||'—'}</td><td>${resp}</td></tr>`;
    }).join('');
    html+=`<div class="card" style="margin-bottom:12px;"><div class="card-title" style="text-transform:capitalize;">${dow}, ${fDate(data)}</div><table><thead><tr><th>Hospital</th><th>Setor</th><th>Horário</th><th>Tipo</th><th>Profissional</th></tr></thead><tbody>${linhas}</tbody></table></div>`;
  });
  const aviso=totFuros>0?`<div class="card" style="border-left:3px solid var(--red);background:var(--red-bg);margin-bottom:12px;"><strong style="color:var(--red);">${totFuros} furo(s)</strong> — plantões ainda sem médico escalado no período.</div>`:'';
  el.innerHTML=aviso+html;
}

// ---- FALTAS (com justificada / não justificada) ----
async function gerarRelFaltas(el){
  el.innerHTML='<div class="card"><div class="empty">Carregando...</div></div>';
  const d1=document.getElementById('rd1').value,d2=document.getElementById('rd2').value;
  let pathCI='/rest/v1/checkins?aprovado=eq.true&select=medico_id,projeto_id,feito_em';
  if(d1)pathCI+=`&feito_em=gte.${d1}T00:00:00`;
  if(d2)pathCI+=`&feito_em=lte.${d2}T23:59:59`;
  const checkins=await sb(pathCI)||[];
  const ciKeys=new Set(checkins.map(c=>`${c.medico_id}_${c.projeto_id}_${(c.feito_em||'').slice(0,10)}`));
  const ausencias=await sb('/rest/v1/ausencias?select=lancamento_id,status,motivo')||[];
  const ausByLanc={}; ausencias.forEach(a=>{ if(a.lancamento_id) ausByLanc[a.lancamento_id]=a; });
  const agora=new Date();
  const dados=filtrarDadosRel().filter(l=>l.medico_id && new Date(`${l.data}T${l.hora_ini||'00:00'}`)<agora);
  const faltas=dados.filter(l=>!ciKeys.has(`${l.medico_id}_${l.projeto_id}_${l.data}`));
  if(!faltas.length){el.innerHTML='<div class="card"><div style="text-align:center;padding:24px;color:var(--green);font-weight:600;">Nenhuma falta no período.</div></div>';return;}
  const classifica=l=>{
    const a=ausByLanc[l.id];
    if(!a) return {txt:'Não justificada (sem aviso)',cor:'var(--red)'};
    const st=(a.status||'').toLowerCase();
    const justif = a.motivo || st.includes('justif') || st.includes('aprov');
    return justif?{txt:'Justificada'+(a.motivo?' — '+a.motivo:''),cor:'var(--amber)'}:{txt:'Não justificada',cor:'var(--red)'};
  };
  const linhas=faltas.slice().sort((a,b)=>b.data.localeCompare(a.data)).map(l=>{const c=classifica(l);return `<tr><td><strong>${l.medico||'—'}</strong></td><td class="mono">${l.crm||''}</td><td>${l.projeto||'—'}</td><td>${l.setor||'—'}</td><td class="mono">${fDate(l.data)}</td><td class="mono">${(l.hora_ini||'').slice(0,5)}–${(l.hora_fim||'').slice(0,5)}</td><td style="color:${c.cor};font-weight:600;">${c.txt}</td><td class="mono">${fBRL(l.honorario||0)}</td></tr>`;}).join('');
  const tot=faltas.reduce((s,l)=>s+(l.honorario||0),0);
  el.innerHTML=`<div class="card"><div style="margin-bottom:10px;font-size:13px;color:var(--red);font-weight:600;">${faltas.length} falta(s) no período</div><table><thead><tr><th>Médico</th><th>CRM</th><th>Hospital</th><th>Setor</th><th>Data</th><th>Horário</th><th>Situação</th><th>Valor</th></tr></thead><tbody>${linhas}</tbody><tfoot><tr style="border-top:1.5px solid var(--border2);"><td colspan="7" style="font-weight:600;padding:8px;">Total</td><td class="mono" style="color:var(--red);font-weight:700;">${fBRL(tot)}</td></tr></tfoot></table></div>`;
}

// ---- ENTRADA E SAÍDA (check-ins) ----
async function gerarRelEntradaSaida(el){
  el.innerHTML='<div class="card"><div class="empty">Carregando...</div></div>';
  const d1=document.getElementById('rd1').value,d2=document.getElementById('rd2').value;
  const dados=filtrarDadosRel();
  if(!dados.length){el.innerHTML='<div class="card"><div class="empty">Nenhum plantão no período.</div></div>';return;}
  let pathCI='/rest/v1/checkins?select=medico_id,projeto_id,feito_em,distancia_metros,aprovado&order=feito_em';
  if(d1)pathCI+=`&feito_em=gte.${d1}T00:00:00`;
  if(d2)pathCI+=`&feito_em=lte.${d2}T23:59:59`;
  const checkins=await sb(pathCI)||[];
  const byKey={}; checkins.forEach(c=>{const k=`${c.medico_id}_${c.projeto_id}_${(c.feito_em||'').slice(0,10)}`;(byKey[k]=byKey[k]||[]).push(c);});
  const fmtH=v=>v?new Date(v.feito_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
  const dist=v=>(v&&v.distancia_metros!=null)?`<span style="color:${v.distancia_metros>100?'var(--red)':'var(--green)'};">${v.distancia_metros}m</span>`:'';
  const linhas=dados.slice().sort((a,b)=>a.data.localeCompare(b.data)||(a.hora_ini||'').localeCompare(b.hora_ini||'')).map(l=>{
    const cs=(byKey[`${l.medico_id}_${l.projeto_id}_${l.data}`]||[]).slice().sort((a,b)=>a.feito_em.localeCompare(b.feito_em));
    const ent=cs[0],sai=cs.length>1?cs[cs.length-1]:null;
    const situ=ent?'Presente':'Sem check-in';
    return `<tr><td class="mono">${fDate(l.data)} ${(l.hora_ini||'').slice(0,5)}</td><td class="mono">${l.horas}h</td><td class="mono">${fmtH(ent)}</td><td class="mono">${dist(ent)}</td><td class="mono">${fmtH(sai)}</td><td class="mono">${dist(sai)}</td><td>${l.projeto||'—'}${l.setor?' - '+l.setor:''}</td><td>${l.medico||'—'}</td><td>${situ}</td><td>${l.tipo||'—'}</td></tr>`;
  }).join('');
  el.innerHTML=`<div class="card"><div class="card-title">Entrada e saída</div><table><thead><tr><th>Data</th><th>Duração</th><th>Entrada</th><th>Dist. entrada</th><th>Saída</th><th>Dist. saída</th><th>Setor</th><th>Responsável</th><th>Situação</th><th>Tipo</th></tr></thead><tbody>${linhas}</tbody></table></div>`;
}

// ---- TROCAS E PASSAGENS ----
async function gerarRelTrocas(el){
  el.innerHTML='<div class="card"><div class="empty">Carregando...</div></div>';
  const d1=document.getElementById('rd1').value,d2=document.getElementById('rd2').value;
  let path='/rest/v1/transferencias?select=*,lancamentos(data,setor,projetos(nome))&order=criado_em.desc';
  if(d1)path+=`&criado_em=gte.${d1}T00:00:00`;
  if(d2)path+=`&criado_em=lte.${d2}T23:59:59`;
  const trs=await sb(path)||[];
  if(!trs.length){el.innerHTML='<div class="card"><div class="empty">Nenhuma troca/passagem no período.</div></div>';return;}
  const nome=id=>{const m=medicos.find(x=>x.id===id);return m?m.nome:'—';};
  const linhas=trs.map(t=>{
    const realizado=t.respondido_em||t.criado_em;
    const plant=t.lancamentos?`${t.lancamentos.projetos?.nome||''}${t.lancamentos.setor?' - '+t.lancamentos.setor:''} · ${t.lancamentos.data?fDate(t.lancamentos.data):''}`:'—';
    return `<tr><td class="mono">${realizado?new Date(realizado).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'}</td><td>${plant}</td><td>${nome(t.medico_origem_id)}</td><td>${nome(t.medico_destino_id)}</td><td>${t.status||'—'}</td><td>${t.justificativa||t.obs||''}</td></tr>`;
  }).join('');
  el.innerHTML=`<div class="card"><div class="card-title">Trocas e passagens de plantões</div><table><thead><tr><th>Realizado em</th><th>Plantão</th><th>Requerente</th><th>Requerido</th><th>Status</th><th>Justificativa</th></tr></thead><tbody>${linhas}</tbody></table></div>`;
}

// ---- EXPORTS genéricos (servem pra qualquer relatório) ----
function exportarRelXLSX(){
  const cont=document.getElementById('rel-resultado');
  const tabelas=cont?cont.querySelectorAll('table'):[];
  if(!tabelas.length){toast('Gere um relatório primeiro',true);return;}
  const wb=XLSX.utils.book_new();
  tabelas.forEach((tb,i)=>{const ws=XLSX.utils.table_to_sheet(tb,{raw:true});XLSX.utils.book_append_sheet(wb,ws,'Relatorio'+(tabelas.length>1?'_'+(i+1):''));});
  XLSX.writeFile(wb,'relatorio_'+_relTipoAtivo+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel exportado!');
}

  win.document.close();setTimeout(()=>{win.focus();win.print();},400);
}
