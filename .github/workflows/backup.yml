name: Backup diário Supabase

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar pg client 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gnupg curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Gerar backup
        env:
          PGHOST: aws-1-sa-east-1.pooler.supabase.com
          PGPORT: "5432"
          PGUSER: postgres.hqtnnadzwtfyfkunwfcy
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGDATABASE: postgres
          PGSSLMODE: require
        run: |
          pg_dump --no-owner --no-acl --clean --if-exists -f backup.sql
          gzip backup.sql

      - name: Salvar
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: backup.sql.gz
          retention-days: 30
