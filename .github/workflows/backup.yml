name: Backup diário Supabase

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar pg client
        run: sudo apt-get install -y postgresql-client

      - name: Gerar backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            --host=aws-0-sa-east-1.pooler.supabase.com \
            --port=6543 \
            --username=postgres.hqtnnadzwtfyfkunwfcy \
            --dbname=postgres \
            --no-owner --no-acl --clean --if-exists \
            -f backup.sql
          gzip backup.sql

      - name: Salvar
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: backup.sql.gz
          retention-days: 30
