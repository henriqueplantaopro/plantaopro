name: Backup diário Supabase

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Instalar pg client
        run: sudo apt-get install -y postgresql-client

      - name: Gerar backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          # Resolve IPv4 do host Supabase para evitar problema com IPv6
          DB_HOST="db.hqtnnadzwtfyfkunwfcy.supabase.co"
          DB_IPV4=$(getent ahostsv4 "$DB_HOST" | head -1 | awk '{print $1}')
          echo "Conectando via IPv4: $DB_IPV4"
          pg_dump \
            --host="$DB_IPV4" \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --no-owner --no-acl --clean --if-exists \
            -f backup.sql
          gzip backup.sql

      - name: Salvar
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: backup.sql.gz
          retention-days: 30
